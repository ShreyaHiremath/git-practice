name: First GitHub Action

on:
  push:
    branches:
      - main

jobs:
  hello-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Make Script Executable
        run: chmod +x myscript.sh

      - name:   Run Script
        run: ./myscript.sh
