name: First GitHub Action

on:
  push:
    branches:
      - main

jobs:
  hello-job:
    runs-on: ubuntu-latest

steps:
  - name: Print Message
    run: echo "Hello Shreya! Your pipeline is running."

  - name: Show Date
    run: date

  - name: Check Current User
    run: whoami

  - name: List Files
    run: ls -la
