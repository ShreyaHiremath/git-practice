name: Azure Resource Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy-rg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name rg-github-demo \
            --location eastus

      - name: Verify Resource Groups
        run: az group list --output table

        
